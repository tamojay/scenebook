<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="500" viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <style>
    .word {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 120px;
      font-weight: 700;
      fill: black;
    }
    .board {
      fill: black;
      stroke: black;
      stroke-width: 6;
    }
    .stripe {
      fill: white;
    }
    .accent {
      stroke: black;
      stroke-width: 8;
      stroke-linecap: round;
    }
  </style>

  <!-- Text -->
  <text x="70" y="300" class="word" letter-spacing="6">SCENEBOO</text>

  <!-- Clapperboard replacing K -->
  <g transform="translate(1020,155)">
    <!-- Bottom board -->
    <rect x="0" y="70" width="180" height="150" rx="4" class="board"/>

    <!-- Inner lines -->
    <line x1="28" y1="125" x2="150" y2="125" stroke="white" stroke-width="6"/>
    <line x1="28" y1="160" x2="150" y2="160" stroke="white" stroke-width="6"/>
    <line x1="28" y1="195" x2="150" y2="195" stroke="white" stroke-width="6"/>

    <!-- Top clap -->
    <polygon points="10,55 145,0 165,35 30,90" class="board"/>

    <!-- Clap stripes -->
    <polygon points="35,45 55,37 72,63 52,71" class="stripe"/>
    <polygon points="78,28 98,20 115,46 95,54" class="stripe"/>
    <polygon points="121,11 141,3 158,29 138,37" class="stripe"/>

    <!-- Accent action lines -->
    <line x1="182" y1="0" x2="176" y2="24" class="accent"/>
    <line x1="214" y1="10" x2="198" y2="28" class="accent"/>
    <line x1="220" y1="44" x2="196" y2="48" class="accent"/>
  </g>
</svg>
